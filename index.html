*{box-sizing:border-box;margin:0;padding:0;}

h1,h2,h3{font-family:'Fredoka One',cursive;letter-spacing:.5px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes floatAnim{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulseAnim{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

button{border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;outline:none;transition:all .18s ease;}
button:hover:not(:disabled){transform:translateY(-2px);filter:brightness(1.1);}

button:disabled{opacity:.45;cursor:not-allowed;}

td{padding:9px 12px;font-size:13px;border-top:1px solid #1F2937;}

function _lsGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function _lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function _lsDel(k){try{localStorage.removeItem(k);}catch(e){}}

function loadCtrl(){
  if(MEM.ctrl!==null) return MEM.ctrl;
  var saved=_lsGet("hh-ctrl");
  MEM.ctrl=saved||{globalOn:false,students:{}};
  return MEM.ctrl;
}
function saveCtrl(d){
  MEM.ctrl=d;
  _lsSet("hh-ctrl",d);
}
function loadProg(sid){
  if(MEM.prog[sid]!==undefined) return MEM.prog[sid];
  var saved=_lsGet("hh-p-"+sid);
  MEM.prog[sid]=saved||null;
  return MEM.prog[sid];
}
function saveProg(sid,d){
  MEM.prog[sid]=d;
  _lsSet("hh-p-"+sid,d);
}
function delProg(sid){
  MEM.prog[sid]=null;
  _lsDel("hh-p-"+sid);
}
function getProgOrDefault(sid){
  return loadProg(sid)||{stage:1,stageScores:[],totalScore:0,completed:false,badges:[]};
}
function canPlay(sid){
  var c=loadCtrl();
  return !!(c.globalOn || c.students[sid]==="on");
}

// ── STYLE HELPERS ──
function s(obj){
  return Object.keys(obj).map(function(k){
    return k.replace(/([A-Z])/g,function(m){return"-"+m.toLowerCase();})+":"+obj[k];
  }).join(";");
}

function mk(tag,attrs,html){
  var e=document.createElement(tag);
  if(attrs) for(var k in attrs){
    if(k==="style" && typeof attrs[k]==="object"){e.style.cssText=s(attrs[k]);}
    else if(k.startsWith("on")){e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);}
    else if(k==="className"){e.className=attrs[k];}
    else{e[k]=attrs[k];}
  }
  if(html!==undefined){
    if(typeof html==="string"){e.innerHTML=html;}
    else if(Array.isArray(html)){html.forEach(function(c){if(c) e.appendChild(typeof c==="string"?document.createTextNode(c):c);});}
    else if(html instanceof Node){e.appendChild(html);}
  }
  return e;
}

function div(style,children){
  var e=document.createElement("div");
  if(style && typeof style==="object") e.style.cssText=s(style);
  else if(style && typeof style==="string") e.className=style;
  if(children!==undefined){
    if(typeof children==="string") e.innerHTML=children;
    else if(Array.isArray(children)) children.forEach(function(c){if(c) e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
    else if(children instanceof Node) e.appendChild(children);
  }
  return e;
}

function card(style,children){
  var e=div(Object.assign({background:"#111827",borderRadius:"20px",border:"1px solid #1F2937",boxShadow:"0 4px 24px rgba(0,0,0,.4)"},style||{}),children);
  return e;
}

function btn(text,style,onClick,disabled){
  var e=mk("button",{style:style,onClick:onClick,disabled:!!disabled});
  e.innerHTML=text;
  return e;
}

function lbl(text){
  return mk("div",{style:{display:"block",color:"#6B7280",fontSize:"12px",fontWeight:700,marginBottom:"6px",letterSpacing:"1px"}},text);
}

      stars.appendChild(mk("span",{style:{color:"#4B5563",fontSize:"12px",marginLeft:"4px"}},sc+"/50"));

    var b=mk("button",{

  } else {
    var isLast=S.qIdx+1>=st.questions.length;
    btmRow.appendChild(btn(isLast?"Finish Stage →":"Next →",{padding:"11px 28px",fontSize:"15px",fontWeight:800,borderRadius:"12px",background:"linear-gradient(135deg,"+st.color+",#0EA5E9)",color:"#fff",border:"none",cursor:"pointer",fontFamily:"'Nunito',sans-serif"},function(){
      if(isLast) setState({screen:"stagewin"});
      else setState({qIdx:S.qIdx+1,selectedOpt:null,revealed:false});
    }));
  }
  c.appendChild(btmRow);
  page.appendChild(c);
  return page;
}

// ══════════════════════════════════════════
// RENDER STAGE WIN
// ══════════════════════════════════════════
function renderStageWin(){
  var st=STAGES[S.stageId-1];
  var isLast=S.stageId===5;
  var page=div({minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#080C14",padding:"20px",textAlign:"center"});

  var ico=div({fontSize:"90px",marginBottom:"14px"}); ico.textContent=st.emoji; ico.className="popIn";
  page.appendChild(ico);
  page.appendChild(mk("h1",{style:{fontSize:"2.2rem",color:st.color,marginBottom:"8px"}},"Stage Complete!"));
  page.appendChild(mk("p",{style:{color:"#94A3B8",marginBottom:"8px",fontSize:"15px"}},st.title));
  page.appendChild(mk("p",{style:{color:"#FBBF24",fontSize:"14px",marginBottom:"26px",fontWeight:700}},"You earned the "+st.badge+" badge! 🏅"));

  var sc=card({padding:"28px 48px",marginBottom:"22px",minWidth:"250px"});
  var sn=div({fontFamily:"'Fredoka One',cursive",fontSize:"3.5rem",color:"#FBBF24"}); sn.textContent=S.stagePts;
  sc.appendChild(sn);
  sc.appendChild(mk("p",{style:{color:"#4B5563",marginBottom:"14px",fontSize:"13px"}},"out of 50 points"));
  var stars=div({display:"flex",gap:"6px",justifyContent:"center"});
  for(var n=1;n<=5;n++) stars.appendChild(mk("span",{style:{fontSize:"28px",color:S.stagePts>=n*10?"#FBBF24":"#1F2937"}},"★"));
  sc.appendChild(stars); page.appendChild(sc);

  page.appendChild(btn(isLast?"🏆 Claim Your Hero Badge!":"Continue to Stage "+(S.stageId+1)+" →",
    {padding:"14px 42px",fontSize:"16px",fontWeight:800,borderRadius:"14px",background:"linear-gradient(135deg,"+st.color+",#0EA5E9)",color:"#fff",border:"none",cursor:"pointer",fontFamily:"'Nunito',sans-serif"},
    function(){
      var prog=getProgOrDefault(S.user.id);
      var newSc=(prog.stageScores||[]).slice();
      newSc[S.stageId-1]=S.stagePts;
      var tot=newSc.reduce(function(a,b){return a+b;},0);
      var np=Object.assign({},prog,{stage:isLast?5:S.stageId+1,stageScores:newSc,totalScore:tot,completed:isLast,badges:(prog.badges||[]).concat([st.badge])});
      saveProg(S.user.id,np);
      setState({screen:isLast?"gameover":"stagemap"});
    }));
  return page;
}

// ══════════════════════════════════════════
// RENDER GAME OVER
// ══════════════════════════════════════════
function renderGameOver(){
  var prog=getProgOrDefault(S.user.id);
  var tot=prog.totalScore||0; var pct=Math.round(tot/250*100);
  var page=div({minHeight:"100vh",background:"radial-gradient(ellipse at 50% 0%,#1A0D00 0%,#080C14 70%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px",textAlign:"center"});

  var ico=div({fontSize:"100px",marginBottom:"14px"}); ico.textContent="🏆"; ico.className="popIn";
  page.appendChild(ico);
  page.appendChild(mk("h1",{style:{fontSize:"2.8rem",color:"#FBBF24",marginBottom:"8px"}},"Congratulations!"));
  page.appendChild(mk("h2",{style:{fontSize:"1.5rem",color:"#F1F5F9",marginBottom:"8px",fontFamily:"'Fredoka One',cursive"}},S.user.name+", you're a Heart Hero!"));
  page.appendChild(mk("p",{style:{color:"#4B5563",maxWidth:"480px",lineHeight:"1.7",marginBottom:"26px",fontSize:"15px"}},"You've completed all 5 stages. Carry kindness, empathy, and respect with you every single day."));

  var sc=card({padding:"30px 50px",marginBottom:"22px"});
  var sn=div({fontFamily:"'Fredoka One',cursive",fontSize:"4rem",color:"#FBBF24"}); sn.textContent=tot;
  sc.appendChild(sn);
  sc.appendChild(mk("p",{style:{color:"#4B5563",marginBottom:"16px",fontSize:"13px"}},"out of 250 total points · "+pct+"%"));
  var starsRow=div({display:"flex",gap:"8px",justifyContent:"center",marginBottom:"22px"});
  for(var n=1;n<=5;n++) starsRow.appendChild(mk("span",{style:{fontSize:"30px",color:pct>=n*20?"#FBBF24":"#1F2937"}},"★"));
  sc.appendChild(starsRow);
  var badges=div({display:"flex",flexWrap:"wrap",gap:"8px",justifyContent:"center"});
  STAGES.forEach(function(s){
    var b=mk("div",{style:{background:s.dark,color:s.color,padding:"6px 14px",borderRadius:"20px",fontSize:"12px",fontWeight:800,border:"1px solid "+s.color,display:"inline-block"}},s.emoji+" "+s.badge);
    badges.appendChild(b);
  });
  sc.appendChild(badges); page.appendChild(sc);

  page.appendChild(mk("p",{style:{color:"#374151",fontSize:"13px",marginBottom:"16px"}},"Your score has been saved. Mr. Verma can see your results."));
  page.appendChild(btn("Back to Login",{padding:"13px 36px",background:"linear-gradient(135deg,#FBBF24,#F97316)",color:"#080C14",fontSize:"15px",fontWeight:800,borderRadius:"14px",border:"none",cursor:"pointer",fontFamily:"'Nunito',sans-serif"},function(){clearInterval(refreshTimer);setState({screen:"login",user:null,role:null});}));
  return page;
}

// ══════════════════════════════════════════
// LEADERBOARD HELPERS
// ══════════════════════════════════════════
function getLeaderboardData(){
  return STUDENTS.map(function(s){
    var p=getProgOrDefault(s.id);
    var sc=p.stageScores||[];
    var stagesCompleted=sc.length;
    var total=p.totalScore||0;
    return {id:s.id,full:s.full,name:s.name,total:total,stagesCompleted:stagesCompleted,completed:p.completed,stageScores:sc};
  }).sort(function(a,b){
    if(b.total!==a.total) return b.total-a.total;
    if(b.stagesCompleted!==a.stagesCompleted) return b.stagesCompleted-a.stagesCompleted;
    return a.full.localeCompare(b.full);
  });
}

function getMedal(rank){
  if(rank===1) return "🥇";
  if(rank===2) return "🥈";
  if(rank===3) return "🥉";
  return rank;
}

function renderLeaderboardContent(currentUserId, isTeacher){
  var data=getLeaderboardData();
  var started=data.filter(function(d){return d.total>0;});
  var wrap=div({});

  // Header
  var hdrDiv=div({textAlign:"center",marginBottom:"22px"});
  hdrDiv.appendChild(mk("h2",{style:{fontSize:"1.6rem",color:"#FBBF24",marginBottom:"6px"}},"🏆 Live Leaderboard"));
  hdrDiv.appendChild(mk("p",{style:{color:"#4B5563",fontSize:"13px"}},"Rankings update as students complete stages · "+(isTeacher?"All 31 students":"Your class · Year 8 Y08I")));
  wrap.appendChild(hdrDiv);

  // Top 3 podium (only if data)
  if(started.length>=1){
    var podiumData=started.slice(0,3);
    var podium=div({display:"flex",alignItems:"flex-end",justifyContent:"center",gap:"12px",marginBottom:"28px",maxWidth:"600px",margin:"0 auto 28px"});

    var order=podiumData.length>=2?[1,0,2]:[0]; // silver, gold, bronze order for visual
    if(podiumData.length===1) order=[0];
    if(podiumData.length===2) order=[1,0];

    order.forEach(function(idx){
      if(!podiumData[idx]) return;
      var d=podiumData[idx];
      var rank=idx+1;
      var heights=["110px","140px","90px"];
      var colors=["#C0C0C0","#FBBF24","#CD7F32"];
      var bgColors=["#1a2030","#1a1a00","#1a0f00"];
      var h2=heights[idx]||"90px";
      var col=colors[idx]||"#6B7280";
      var bg=bgColors[idx]||"#111827";
      var isMe=currentUserId&&d.id===currentUserId;

      var block=div({display:"flex",flexDirection:"column",alignItems:"center",flex:1,maxWidth:"180px"});
      var nameDiv=mk("div",{style:{color:isMe?"#2DD4BF":col,fontSize:"13px",fontWeight:800,marginBottom:"6px",textAlign:"center",maxWidth:"130px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},d.name);
      var scoreDiv=mk("div",{style:{color:"#9CA3AF",fontSize:"12px",marginBottom:"8px"}},"⭐ "+d.total+" pts");
      var pillar=div({width:"100%",height:h2,background:bg,border:"2px solid "+col,borderRadius:"12px 12px 0 0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"4px"});
      var medal=mk("div",{style:{fontSize:"32px"}},rank===1?"🥇":rank===2?"🥈":"🥉");
      var rankNum=mk("div",{style:{fontFamily:"'Fredoka One',cursive",color:col,fontSize:"1.4rem"}},""+d.total);
      pillar.appendChild(medal); pillar.appendChild(rankNum);
      if(isMe){
        var youTag=mk("div",{style:{background:"#2DD4BF",color:"#080C14",fontSize:"10px",fontWeight:800,padding:"2px 8px",borderRadius:"8px",marginTop:"3px"}},"YOU");
        pillar.appendChild(youTag);
      }
      block.appendChild(nameDiv); block.appendChild(scoreDiv); block.appendChild(pillar);
      podium.appendChild(block);
    });
    wrap.appendChild(podium);
  }

  // Full rankings table
  var tableWrap=div({overflowX:"auto"});
  var tbl=mk("table",{});
  var thead=mk("thead",{}); var hr=mk("tr",{});
  ["RANK","STUDENT","TOTAL","STAGES","PROGRESS","BADGES"].forEach(function(h){hr.appendChild(mk("th",{},h));});
  thead.appendChild(hr); tbl.appendChild(thead);

  var tbody=mk("tbody",{});
  var rank=1;
  data.forEach(function(d){
    var isMe=currentUserId&&d.id===currentUserId;
    var hasData=d.total>0||d.stagesCompleted>0;
    var tr=mk("tr",{style:{background:isMe?"#0C2A26":"transparent",transition:"background .2s"}});
    if(!isMe){
      tr.addEventListener("mouseenter",function(){this.style.background="#111827";});
      tr.addEventListener("mouseleave",function(){this.style.background="transparent";});
    }

    // Rank
    var rankCell=mk("td",{style:{textAlign:"center"}});
    var rankContent=mk("div",{style:{fontFamily:"'Fredoka One',cursive",fontSize:rank<=3?"1.3rem":"1rem",color:rank===1?"#FBBF24":rank===2?"#C0C0C0":rank===3?"#CD7F32":"#4B5563",fontWeight:700}},hasData?getMedal(rank):"—");
    rankCell.appendChild(rankContent); tr.appendChild(rankCell);

    // Name
    var nameCell=mk("td",{});
    var nameDiv=mk("div",{style:{fontWeight:700,color:isMe?"#2DD4BF":"#F1F5F9",fontSize:"13px"}},d.full+(isMe?" (You)":""));
    if(d.completed) nameDiv.appendChild(mk("span",{style:{marginLeft:"6px",fontSize:"11px",color:"#10B981"}},"✅"));
    nameCell.appendChild(nameDiv); tr.appendChild(nameCell);

    // Total score
    tr.appendChild(mk("td",{style:{color:"#FBBF24",fontWeight:800,fontSize:"14px",fontFamily:"'Fredoka One',cursive"}},hasData?d.total+" pts":"—"));

    // Stages
    var stageCell=mk("td",{style:{color:"#94A3B8",fontSize:"13px"}});
    stageCell.textContent=hasData?d.stagesCompleted+"/5":"—";
    tr.appendChild(stageCell);

    // Mini progress bar
    var progCell=mk("td",{style:{minWidth:"100px"}});
    var pct=Math.round((d.total/250)*100);
    var barWrap=mk("div",{style:{height:"6px",borderRadius:"3px",background:"#1F2937",overflow:"hidden",width:"100px"}});
    var barFill=mk("div",{style:{height:"100%",borderRadius:"3px",width:pct+"%",background:d.completed?"#10B981":"linear-gradient(90deg,#2DD4BF,#3B82F6)",transition:"width .7s ease"}});
    barWrap.appendChild(barFill);
    var pctLbl=mk("div",{style:{color:"#4B5563",fontSize:"10px",marginTop:"2px"}},hasData?pct+"%":"");
    progCell.appendChild(barWrap); progCell.appendChild(pctLbl); tr.appendChild(progCell);

    // Stage emojis
    var badgeCell=mk("td",{});
    var badgeRow=div({display:"flex",gap:"3px",flexWrap:"wrap"});
    STAGES.forEach(function(st,i){
      var earned=d.stageScores[i]!==undefined;
      var b=mk("span",{style:{fontSize:"14px",opacity:earned?"1":"0.2",title:st.badge}},st.emoji);
      badgeRow.appendChild(b);
    });
    badgeCell.appendChild(badgeRow); tr.appendChild(badgeCell);

    if(hasData) rank++;
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody); tableWrap.appendChild(tbl);
  wrap.appendChild(tableWrap);

  // Summary stats
  var notStarted=data.filter(function(d){return d.total===0;}).length;
  var inProg=data.filter(function(d){return d.total>0&&!d.completed;}).length;
  var comp=data.filter(function(d){return d.completed;}).length;
  var avgScore=started.length>0?Math.round(started.reduce(function(a,d){return a+d.total;},0)/started.length):0;
  var statsRow=div({display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px",marginTop:"20px"});
  [["Not Started",notStarted,"#374151"],["In Progress",inProg,"#F59E0B"],["Completed",comp,"#10B981"],["Avg Score",avgScore+" pts","#2DD4BF"]].forEach(function(row){
    var sc=div({background:"#111827",borderRadius:"12px",border:"1px solid #1F2937",padding:"12px",textAlign:"center"});
    var num=div({fontFamily:"'Fredoka One',cursive",fontSize:"1.5rem",color:row[2]}); num.textContent=row[1];
    sc.appendChild(num);
    sc.appendChild(mk("p",{style:{fontSize:"11px",color:"#4B5563",marginTop:"2px"}},row[0]));
    statsRow.appendChild(sc);
  });
  wrap.appendChild(statsRow);
  return wrap;
}

function renderLeaderboardScreen(){
  var page=div({minHeight:"100vh",background:"#080C14",padding:"20px"});

  // Top bar
  var topbar=div({display:"flex",justifyContent:"space-between",alignItems:"center",maxWidth:"920px",margin:"0 auto 24px",flexWrap:"wrap",gap:"10px"});
  var tl=div({display:"flex",alignItems:"center",gap:"10px"});
  tl.innerHTML='<span style="font-size:28px">💖</span>';
  var tt=div({});
  tt.appendChild(mk("h1",{style:{fontSize:"1.25rem",color:"#2DD4BF",margin:0}},"Heart Heroes"));
  tt.appendChild(mk("p",{style:{color:"#4B5563",fontSize:"12px",margin:0}},S.user.full+" · Year 8"));
  tl.appendChild(tt); topbar.appendChild(tl);

  var tr2=div({display:"flex",gap:"10px",alignItems:"center"});
  var prog=getProgOrDefault(S.user.id);
  var ptsdiv=div({background:"#111827",padding:"6px 14px",borderRadius:"20px",color:"#FBBF24",fontSize:"14px",fontWeight:700});
  ptsdiv.textContent="⭐ "+(prog.totalScore||0)+" pts";
  tr2.appendChild(ptsdiv);
  tr2.appendChild(btn("← Back to Game",{padding:"7px 14px",background:"linear-gradient(135deg,#2DD4BF,#0EA5E9)",color:"#080C14",fontSize:"13px",fontWeight:800,borderRadius:"10px",border:"none",cursor:"pointer",fontFamily:"'Nunito',sans-serif"},function(){setState({screen:"stagemap"});}));
  topbar.appendChild(tr2);
  page.appendChild(topbar);

  var inner=div({maxWidth:"920px",margin:"0 auto"});
  inner.appendChild(renderLeaderboardContent(S.user.id,false));
  page.appendChild(inner);
  return page;
}

// ══════════════════════════════════════════
// TIMERS + MAIN RENDER
// ══════════════════════════════════════════
function startStudentRefresh(){
  clearInterval(refreshTimer);
  // Check immediately on login — no waiting for first tick
  if(S.role==="student" && S.screen==="waiting" && canPlay(S.user.id)){
    setState({screen:"stagemap"});
    return;
  }
  // Then poll every 1 second
  refreshTimer=setInterval(function(){
    if(S.role==="student" && S.screen==="waiting" && canPlay(S.user.id)){
      clearInterval(refreshTimer);
      setState({screen:"stagemap"});
    }
  },1000);
}

function render(){
  var app=document.getElementById("app");
  app.innerHTML="";
  var content;
  if(S.screen==="login") content=renderLogin();
  else if(S.screen==="waiting") content=renderWaiting();
  else if(S.screen==="teacher") content=renderTeacher();
  else if(S.screen==="stagemap") content=renderStageMap();
  else if(S.screen==="playing") content=renderPlaying();
  else if(S.screen==="leaderboard") content=renderLeaderboardScreen();
  else if(S.screen==="stagewin") content=renderStageWin();
  else if(S.screen==="gameover") content=renderGameOver();
  else content=renderLogin();
  app.appendChild(content);
}

render();
</script>
